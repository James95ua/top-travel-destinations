<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact us for travel information.">
  <title>Contact</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>Top Travel Destinations</h1>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="destinations.html">Destinations</a></li>
      <li><a href="tips.html">Travel Tips</a></li>
      <li><a href="prices.html">Prices &amp; Seasons</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
</header>

<main>

  <h2>Contact Us</h2>

 <form>
  <label for="name">Name:</label>
  <input type="text" id="name" name="name" required>

  <label for="email">Email:</label>
  <input type="email" id="email" name="email" required>

  <label for="phone">Phone:</label>
  <input type="tel" id="phone" name="phone">

  <label for="date">Travel Date:</label>
  <input type="date" id="date" name="date">

  <label for="destination">Preferred Destination:</label>
  <select id="destination" name="destination">
    <option value="paris">Paris</option>
    <option value="rome">Rome</option>
    <option value="tokyo">Tokyo</option>
    <option value="dubai">Dubai</option>
  </select>

  <label for="budget">Budget Level:</label>
  <select id="budget" name="budget">
    <option value="low">Low</option>
    <option value="medium">Medium</option>
    <option value="high">High</option>
  </select>

  <label for="message">Message:</label>
  <textarea id="message" name="message"></textarea>

  <button type="submit">Submit</button>
</form>

</main>

<footer>
  <p>&copy; 2026 Top Travel Destinations</p>
</footer>

</body>
</html>
